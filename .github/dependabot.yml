version: 2
updates:
  # Regla común: sin bumps de versión MAYOR durante el TFM (rompedores, ruido).
  # Los minors/patches y los avisos de seguridad siguen llegando con normalidad.
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
    labels: [dependencies]
    commit-message:
      prefix: "chore"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies]
    commit-message:
      prefix: "chore"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies]
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

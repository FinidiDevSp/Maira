name: 🐛 Bug
description: Algo no funciona como debería
title: "[BUG] "
labels: [bug]
body:
  - type: textarea
    id: descripcion
    attributes:
      label: ¿Qué ha pasado?
      description: Describe el problema con tus palabras.
    validations:
      required: true
  - type: textarea
    id: pasos
    attributes:
      label: Pasos para reproducirlo
      placeholder: |
        1. Entro en...
        2. Pulso...
        3. Aparece...
    validations:
      required: true
  - type: textarea
    id: esperado
    attributes:
      label: ¿Qué esperabas que pasara?
    validations:
      required: true
  - type: dropdown
    id: entorno
    attributes:
      label: ¿Dónde ocurre?
      options:
        - Producción (web desplegada)
        - Desarrollo local
        - Docker local
    validations:
      required: true
  - type: input
    id: navegador
    attributes:
      label: Navegador y dispositivo
      placeholder: "Chrome 126 en Android / Firefox en Windows..."

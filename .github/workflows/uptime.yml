name: Uptime

# Sondea el /health de producción cada 10 min y reenvía el resultado a
# Healthchecks.io (que solo recibe pings, no sondea). Si el backend no
# responde: señal /fail → email. Efecto secundario deseado: mantiene
# despierto el free tier de Render.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  sondeo:
    name: Sondeo /health de producción
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar backend y avisar a Healthchecks
        env:
          PING_URL: ${{ secrets.HEALTHCHECKS_PING_URL }}
          BACKEND_URL: https://maira-backend-sj81.onrender.com
        run: |
          if [ -z "$PING_URL" ]; then
            echo "::error::Falta el secret HEALTHCHECKS_PING_URL"; exit 1
          fi
          # -m 90: el cold start de Render free puede tardar ~un minuto
          if curl -fsS -m 90 --retry 1 "$BACKEND_URL/health" > /dev/null; then
            curl -fsS -m 10 --retry 3 "$PING_URL" > /dev/null
            echo "Backend OK — ping enviado a Healthchecks"
          else
            curl -fsS -m 10 --retry 3 "$PING_URL/fail" > /dev/null || true
            echo "::error::El backend no responde — señal de fallo enviada"
            exit 1
          fi
